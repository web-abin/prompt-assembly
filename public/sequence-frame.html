<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <title>视频转序列帧 18fps 动画演示</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
    body{padding:20px;background:#f5f5f5}
    .container{max-width:1200px;margin:0 auto}
    .panel{background:white;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 8px #0001}
    
    input[type="file"]{margin-bottom:10px}
    .btn{padding:8px 16px;background:#007bff;color:white;border:none;border-radius:6px;cursor:pointer;margin-right:8px}
    .btn:disabled{background:#999}
    
    #frames{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:16px}
    #frames img{width:100%;height:auto;border-radius:6px;object-fit:contain;border:1px solid #eee}
    
    .status{color:#666;margin:10px 0}

    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:999}
    .modal.show{display:flex}
    .modal-content{position:relative}
    #demoCanvas{display:block;max-width:90vw;max-height:90vh;background:#000}
    .close-btn{position:absolute;top:-40px;right:0;background:#ff4444;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer}
  </style>
</head>
<body>

<div class="container">
  <div class="panel">
    <h2>视频提取序列帧（18 帧/秒）</h2>
    <input type="file" id="videoInput" accept="video/*"/>
    <button class="btn" id="start">开始提取帧</button>
    <button class="btn" id="playDemo" disabled>播放序列帧动画</button>
    <button class="btn" id="downloadAll" disabled>一键下载所有帧(ZIP)</button>
    <div class="status" id="status"></div>
  </div>

  <div class="panel">
    <h3>提取的序列帧列表</h3>
    <div id="frames"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close-btn" id="closeModal">关闭</button>
    <canvas id="demoCanvas"></canvas>
  </div>
</div>

<!-- 引入 ZIP 库 -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<script>
const videoInput = document.getElementById('videoInput');
const startBtn = document.getElementById('start');
const playDemoBtn = document.getElementById('playDemo');
const downloadAllBtn = document.getElementById('downloadAll');
const status = document.getElementById('status');
const framesContainer = document.getElementById('frames');

const modal = document.getElementById('modal');
const demoCanvas = document.getElementById('demoCanvas');
const ctx = demoCanvas.getContext('2d');
const closeModal = document.getElementById('closeModal');

const FPS = 12;
let frames = [];
let animId = null;

// 提取帧
startBtn.onclick = async () => {
  const file = videoInput.files?.[0];
  if (!file) return alert('请先选择视频');

  startBtn.disabled = true;
  playDemoBtn.disabled = true;
  downloadAllBtn.disabled = true;
  status.textContent = '加载视频中...';
  frames = [];
  framesContainer.innerHTML = '';

  const video = document.createElement('video');
  video.muted = true;
  video.src = URL.createObjectURL(file);

  await new Promise(resolve => video.onloadedmetadata = resolve);
  const duration = video.duration;
  const totalFrames = Math.floor(duration * FPS);
  status.textContent = `总帧数：${totalFrames}，提取中...`;

  const canvas = document.createElement('canvas');
  const ctxTmp = canvas.getContext('2d');

  for (let i = 0; i < totalFrames; i++) {
    video.currentTime = i / FPS;
    await new Promise(resolve => video.onseeked = resolve);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctxTmp.drawImage(video, 0, 0);

    const url = canvas.toDataURL('image/png');
    frames.push(url);

    const img = new Image();
    img.src = url;
    framesContainer.appendChild(img);

    status.textContent = `已提取 ${i+1}/${totalFrames} 帧`;
  }

  status.textContent = '提取完成！';
  playDemoBtn.disabled = false;
  downloadAllBtn.disabled = false;
  startBtn.disabled = false;
};

// 播放动画（弹窗）
playDemoBtn.onclick = () => {
  if (frames.length === 0) return;
  modal.classList.add('show');
  playDemoBtn.disabled = true;

  const firstImg = new Image();
  firstImg.src = frames[0];
  firstImg.onload = () => {
    demoCanvas.width = firstImg.naturalWidth;
    demoCanvas.height = firstImg.naturalHeight;
    startAnimation();
  };
};

// 循环播放
function startAnimation() {
  let index = 0;
  function loop() {
    const img = new Image();
    img.src = frames[index];
    img.onload = () => {
      ctx.clearRect(0, 0, demoCanvas.width, demoCanvas.height);
      ctx.drawImage(img, 0, 0);
    };
    index = (index + 1) % frames.length;
    animId = setTimeout(loop, 1000 / FPS);
  }
  loop();
}

// 关闭弹窗
closeModal.onclick = () => {
  modal.classList.remove('show');
  clearTimeout(animId);
  playDemoBtn.disabled = false;
};

// 一键下载全部序列帧 ZIP
downloadAllBtn.onclick = async () => {
  if (frames.length === 0) return;
  
  downloadAllBtn.disabled = true;
  status.textContent = '正在打包 ZIP，请稍候...';

  const zip = new JSZip();
  const folder = zip.folder("序列帧");

  for (let i = 0; i < frames.length; i++) {
    const data = frames[i].split(',')[1];
    // 命名：序列帧-01、序列帧-02...
    const num = String(i + 1).padStart(2, '0');
    const filename = `序列帧-${num}.png`;
    folder.file(filename, data, { base64: true });
  }

  const blob = await zip.generateAsync({ type: 'blob' });
  saveAs(blob, '视频序列帧.zip');

  status.textContent = '下载完成！';
  downloadAllBtn.disabled = false;
};
</script>
</body>
</html>
