<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <title>视频转序列帧动画演示</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
    body{padding:20px;background:#f5f5f5}
    .container{max-width:1200px;margin:0 auto}
    .panel{background:white;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 8px #0001}

    input[type="file"]{margin-bottom:10px}
    .field{display:flex;align-items:center;gap:8px;margin:8px 0 12px}
    .field label{font-size:14px;color:#333}
    .field input[type="number"]{width:90px;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:14px}
    .btn{padding:8px 16px;background:#007bff;color:white;border:none;border-radius:6px;cursor:pointer;margin-right:8px}
    .btn:disabled{background:#999;cursor:not-allowed}
    .btn.secondary{background:#fff;color:#2563eb;border:1px solid #ddd}
    .btn.secondary:disabled{background:#fafafa;color:#aaa}

    .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:12px}
    .toolbar .count{margin-left:auto;font-size:13px;color:#666}

    #frames{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:8px}
    .frame-item{position:relative;border:2px solid #e5e7eb;border-radius:10px;overflow:hidden;background:#fafafa;cursor:pointer;padding:0;width:100%}
    .frame-item img{display:block;width:100%;height:auto;object-fit:contain}
    .frame-item.selected{border-color:#2563eb}
    .frame-item:not(.selected) img{opacity:0.45}
    .frame-check{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.9);border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:transparent}
    .frame-item.selected .frame-check{background:#2563eb;border-color:#2563eb;color:#fff}
    .frame-index{position:absolute;bottom:6px;right:6px;padding:2px 6px;border-radius:6px;background:rgba(0,0,0,0.55);color:#fff;font-size:11px;font-weight:600}

    .status{color:#666;margin:10px 0}

    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:999}
    .modal.show{display:flex}
    .modal-content{position:relative}
    #demoCanvas{display:block;max-width:90vw;max-height:90vh;background:#000}
    .close-btn{position:absolute;top:-40px;right:0;background:#ff4444;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer}
    .back-home{margin:0 0 16px}
    .back-home a{display:inline-block;padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#2563eb;text-decoration:none;font-size:14px;font-weight:500}
    .back-home a:hover{background:#eff6ff}
  </style>
</head>
<body>

<div class="container">
  <div class="back-home"><a href="index.html#/">← 返回首页</a></div>
  <div class="panel">
    <h2>视频提取序列帧</h2>
    <input type="file" id="videoInput" accept="video/*"/>
    <div class="field">
      <label for="fpsInput">帧率 (FPS)：</label>
      <input type="number" id="fpsInput" value="12" min="1" max="60" step="1"/>
    </div>
    <button class="btn" id="start">开始提取帧</button>
    <button class="btn" id="playDemo" disabled>试播选中帧</button>
    <button class="btn" id="downloadAll" disabled>下载选中帧 (ZIP)</button>
    <div class="status" id="status"></div>
  </div>

  <div class="panel">
    <h3>提取的序列帧列表</h3>
    <div class="toolbar" id="toolbar" style="display:none">
      <button type="button" class="btn secondary" id="selectAll">全选</button>
      <button type="button" class="btn secondary" id="clearSel">取消全选</button>
      <span class="count" id="selCount">已选 0 / 0 帧</span>
    </div>
    <div id="frames"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close-btn" id="closeModal">关闭</button>
    <canvas id="demoCanvas"></canvas>
  </div>
</div>

<!-- 引入 ZIP 库 -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<script>
const videoInput = document.getElementById('videoInput');
const fpsInput = document.getElementById('fpsInput');
const startBtn = document.getElementById('start');
const playDemoBtn = document.getElementById('playDemo');
const downloadAllBtn = document.getElementById('downloadAll');
const status = document.getElementById('status');
const framesContainer = document.getElementById('frames');
const toolbar = document.getElementById('toolbar');
const selectAllBtn = document.getElementById('selectAll');
const clearSelBtn = document.getElementById('clearSel');
const selCount = document.getElementById('selCount');

const modal = document.getElementById('modal');
const demoCanvas = document.getElementById('demoCanvas');
const ctx = demoCanvas.getContext('2d');
const closeModal = document.getElementById('closeModal');

const DEFAULT_FPS = 12;
const MIN_FPS = 1;
const MAX_FPS = 60;
let extractedFps = DEFAULT_FPS;
let frames = [];
let selected = new Set();
let frameNodes = [];
let animId = null;

function resolveFps() {
  const n = Number(fpsInput.value);
  if (!Number.isFinite(n) || n < MIN_FPS) return MIN_FPS;
  if (n > MAX_FPS) return MAX_FPS;
  return Math.floor(n);
}

fpsInput.addEventListener('blur', () => {
  fpsInput.value = String(resolveFps());
});

function updateSelectionUI() {
  selCount.textContent = `已选 ${selected.size} / ${frames.length} 帧`;
  selectAllBtn.disabled = frames.length > 0 && selected.size === frames.length;
  clearSelBtn.disabled = selected.size === 0;
  const hasSel = selected.size > 0;
  playDemoBtn.disabled = !hasSel;
  downloadAllBtn.disabled = !hasSel;
}

function setSelected(index, isSel) {
  if (isSel) selected.add(index);
  else selected.delete(index);
  const node = frameNodes[index];
  if (node) node.classList.toggle('selected', isSel);
  updateSelectionUI();
}

function buildFrameNode(url, i) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'frame-item selected';
  btn.setAttribute('aria-pressed', 'true');

  const img = document.createElement('img');
  img.src = url;
  img.alt = '';
  btn.appendChild(img);

  const check = document.createElement('span');
  check.className = 'frame-check';
  check.textContent = '✓';
  btn.appendChild(check);

  const idx = document.createElement('span');
  idx.className = 'frame-index';
  idx.textContent = String(i + 1);
  btn.appendChild(idx);

  btn.onclick = () => {
    const next = !selected.has(i);
    setSelected(i, next);
    btn.setAttribute('aria-pressed', String(next));
  };
  return btn;
}

selectAllBtn.onclick = () => {
  selected = new Set(frames.map((_, i) => i));
  frameNodes.forEach((n) => {
    n.classList.add('selected');
    n.setAttribute('aria-pressed', 'true');
  });
  updateSelectionUI();
};
clearSelBtn.onclick = () => {
  selected = new Set();
  frameNodes.forEach((n) => {
    n.classList.remove('selected');
    n.setAttribute('aria-pressed', 'false');
  });
  updateSelectionUI();
};

// 提取帧
startBtn.onclick = async () => {
  const file = videoInput.files?.[0];
  if (!file) return alert('请先选择视频');

  const fps = resolveFps();
  fpsInput.value = String(fps);
  extractedFps = fps;

  startBtn.disabled = true;
  fpsInput.disabled = true;
  playDemoBtn.disabled = true;
  downloadAllBtn.disabled = true;
  status.textContent = '加载视频中...';
  frames = [];
  selected = new Set();
  frameNodes = [];
  framesContainer.innerHTML = '';
  toolbar.style.display = 'none';

  const video = document.createElement('video');
  video.muted = true;
  video.src = URL.createObjectURL(file);

  await new Promise(resolve => video.onloadedmetadata = resolve);
  const duration = video.duration;
  const totalFrames = Math.floor(duration * fps);
  status.textContent = `总帧数：${totalFrames}，提取中...`;

  const canvas = document.createElement('canvas');
  const ctxTmp = canvas.getContext('2d');

  for (let i = 0; i < totalFrames; i++) {
    video.currentTime = i / fps;
    await new Promise(resolve => video.onseeked = resolve);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctxTmp.drawImage(video, 0, 0);

    const url = canvas.toDataURL('image/png');
    frames.push(url);
    selected.add(i);

    const node = buildFrameNode(url, i);
    frameNodes.push(node);
    framesContainer.appendChild(node);

    status.textContent = `已提取 ${i+1}/${totalFrames} 帧`;
  }

  if (frames.length > 0) toolbar.style.display = 'flex';
  updateSelectionUI();

  status.textContent = '提取完成！';
  startBtn.disabled = false;
  fpsInput.disabled = false;
};

function getSelectedFrames() {
  const indices = Array.from(selected).sort((a, b) => a - b);
  return indices.map((i) => frames[i]);
}

// 播放动画（弹窗）
playDemoBtn.onclick = () => {
  const sources = getSelectedFrames();
  if (sources.length === 0) return alert('请先选择至少一帧');
  modal.classList.add('show');

  const firstImg = new Image();
  firstImg.src = sources[0];
  firstImg.onload = () => {
    demoCanvas.width = firstImg.naturalWidth;
    demoCanvas.height = firstImg.naturalHeight;
    startAnimation(sources);
  };
};

// 循环播放
function startAnimation(sources) {
  let index = 0;
  function loop() {
    const img = new Image();
    img.src = sources[index];
    img.onload = () => {
      ctx.clearRect(0, 0, demoCanvas.width, demoCanvas.height);
      ctx.drawImage(img, 0, 0);
    };
    index = (index + 1) % sources.length;
    animId = setTimeout(loop, 1000 / extractedFps);
  }
  loop();
}

// 关闭弹窗
closeModal.onclick = () => {
  modal.classList.remove('show');
  clearTimeout(animId);
};

// 一键下载选中序列帧 ZIP
downloadAllBtn.onclick = async () => {
  const sources = getSelectedFrames();
  if (sources.length === 0) return alert('请先选择至少一帧');

  downloadAllBtn.disabled = true;
  status.textContent = '正在打包 ZIP，请稍候...';

  const zip = new JSZip();
  const folder = zip.folder("序列帧");
  const pad = Math.max(2, String(sources.length).length);

  for (let i = 0; i < sources.length; i++) {
    const data = sources[i].split(',')[1];
    const num = String(i + 1).padStart(pad, '0');
    folder.file(`序列帧-${num}.png`, data, { base64: true });
  }

  const blob = await zip.generateAsync({ type: 'blob' });
  saveAs(blob, '视频序列帧.zip');

  status.textContent = '下载完成！';
  downloadAllBtn.disabled = false;
};
</script>
</body>
</html>
