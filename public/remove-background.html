<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <title>通用背景去除工具 - AI造物进化内测</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { max-width: 900px; margin: 20px auto; padding: 0 20px; background: #f0f2f5; color: #333; }
        .card { background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; font-size: 1.6rem; display: flex; align-items: center; gap: 12px; }
        h2::before { content: '🎨'; }
        .area { margin: 20px 0; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #555; }
        
        /* 上传区域 */
        input[type="file"] { padding: 20px; border: 2px dashed #d9d9d9; width: 100%; border-radius: 12px; cursor: pointer; background: #fafafa; transition: all 0.3s; text-align: center; }
        input[type="file"]:hover { border-color: #1890ff; background: #f0faff; }

        /* 控制面板 */
        .controls-panel { background: #f9f9f9; padding: 20px; border-radius: 12px; border: 1px solid #eee; }
        .control-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        
        /* 颜色选择区域 */
        .color-picker-group { display: flex; align-items: center; gap: 10px; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        input[type="color"] { width: 50px; height: 40px; border: none; border-radius: 6px; cursor: pointer; padding: 0; background: none; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: monospace; }

        /* 滑块 */
        .slider-group { display: flex; flex-direction: column; gap: 5px; }
        input[type="range"] { width: 100%; height: 6px; cursor: pointer; }
        .slider-header { display: flex; justify-content: space-between; font-size: 13px; color: #666; }

        /* 按钮 */
        .btn-group { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 14px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; transition: all 0.3s; }
        #processBtn { background: #1890ff; color: white; }
        #processBtn:hover { background: #40a9ff; }
        #downloadBtn { background: #52c41a; color: white; display: none; text-decoration: none; text-align: center; }
        #downloadBtn:hover { background: #73d13d; }

        /* 预览区域 */
        .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .box h4 { margin-top: 0; color: #888; font-size: 14px; text-align: center; }
        .img-container { border: 1px solid #eee; border-radius: 12px; height: 380px; display: flex; align-items: center; justify-content: center; background: #fff; overflow: hidden; position: relative; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* 棋盘格透明背景 */
        .transparent-bg { background-image: linear-gradient(45deg, #f0f0f0 25%, transparent 25%, transparent 75%, #f0f0f0 75%), linear-gradient(45deg, #f0f0f0 25%, transparent 25%, transparent 75%, #f0f0f0 75%); background-size: 20px 20px; background-position: 0 0, 10px 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>通用背景去除工具 <small style="font-weight: normal; font-size: 12px; color: #aaa; margin-left:10px;">(Canvas 零依赖版)</small></h2>
    
    <div class="area">
        <label>1. 上传图片 (支持 jpg, png, webp)</label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="controls-panel area">
        <label>2. 设置背景参数</label>
        
        <div class="control-row">
            <div class="color-picker-group">
                <input type="color" id="bgColorPicker" value="#ffffff">
                <input type="text" id="bgColorHex" value="#FFFFFF" placeholder="#RRGGBB" maxlength="7">
            </div>
            
            <div style="display: flex; gap: 8px; align-items: center;">
                <button style="background:#fff; color:#333; border:1px solid #ddd; padding:8px 12px; font-size:12px;" onclick="setQuickColor('#FFFFFF')">白色</button>
                <button style="background:#00B050; color:#fff; border:none; padding:8px 12px; font-size:12px;" onclick="setQuickColor('#00B050')">绿幕</button>
                <button style="background:#00479d; color:#fff; border:none; padding:8px 12px; font-size:12px;" onclick="setQuickColor('#00479d')">蓝幕</button>
            </div>
        </div>

        <div class="control-row">
            <div class="slider-group">
                <div class="slider-header">
                    <span>颜色容差 (阈值)</span>
                    <span id="thresholdVal">30</span>
                </div>
                <input type="range" id="threshold" min="0" max="150" value="30">
            </div>
            
            <div class="slider-group">
                <div class="slider-header">
                    <span>边缘羽化 (平滑)</span>
                    <span id="featherVal">2</span>
                </div>
                <input type="range" id="feather" min="0" max="10" value="2">
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button id="processBtn">立即去除背景</button>
        <a id="downloadBtn" href="#">📥 保存透明 PNG</a>
    </div>

    <div class="preview-grid">
        <div class="box">
            <h4>原始素材</h4>
            <div class="img-container" id="originBox">
                <span style="color:#ccc;">等待上传...</span>
            </div>
        </div>
        <div class="box">
            <h4>去背景结果</h4>
            <div class="img-container transparent-bg" id="resultBox">
                <span style="color:#ccc;">等待处理...</span>
            </div>
        </div>
    </div>
</div>

<script>
    // --- UI 交互逻辑 ---
    const fileInput = document.getElementById('fileInput');
    const bgColorPicker = document.getElementById('bgColorPicker');
    const bgColorHex = document.getElementById('bgColorHex');
    const thresholdInput = document.getElementById('threshold');
    const featherInput = document.getElementById('feather');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    
    let originalImage = null;

    // 同步颜色选择器和十六进制输入框
    bgColorPicker.addEventListener('input', (e) => {
        bgColorHex.value = e.target.value.toUpperCase();
    });
    
    bgColorHex.addEventListener('input', (e) => {
        const hex = e.target.value;
        if (/^#[0-9A-F]{6}$/i.test(hex)) {
            bgColorPicker.value = hex;
        }
    });

    // 快捷颜色设置
    function setQuickColor(hex) {
        bgColorPicker.value = hex;
        bgColorHex.value = hex.toUpperCase();
    }

    // 更新滑块数值显示
    thresholdInput.oninput = () => document.getElementById('thresholdVal').innerText = thresholdInput.value;
    featherInput.oninput = () => document.getElementById('featherVal').innerText = featherInput.value;

    // 处理文件上传
    fileInput.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = event => {
            originalImage = new Image();
            originalImage.onload = () => {
                const box = document.getElementById('originBox');
                box.innerHTML = `<img src="${event.target.result}" alt="原图">`;
                // 上传后自动触发一次处理，提升体验
                process();
            };
            originalImage.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    processBtn.onclick = () => {
        if (!originalImage) return alert('请先上传图片');
        process();
    };

    // --- 核心算法逻辑 ---

    // 辅助函数：将 Hex 颜色转为 RGB 对象
    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
            r: parseInt(result[1], 16),
            g: parseInt(result[2], 16),
            b: parseInt(result[3], 16)
        } : null;
    }

    function process() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = originalImage.width;
        canvas.height = originalImage.height;
        ctx.drawImage(originalImage, 0, 0);

        // 获取像素数据
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data; // [r,g,b,a, ...]
        
        // 获取用户设置的参数
        const targetHex = bgColorHex.value;
        const targetRgb = hexToRgb(targetHex);
        if (!targetRgb) return alert('无效的背景颜色格式');
        
        const threshold = parseInt(thresholdInput.value);
        // 羽化范围控制：羽化值越大，过渡区域越广
        const featherRange = parseInt(featherInput.value) * 15; 

        // 核心循环：遍历每个像素
        for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i+1];
            const b = data[i+2];
            const a = data[i+3];

            if (a === 0) continue; // 如果已经是透明的，跳过

            // 计算当前像素颜色与目标背景颜色的欧几里得距离 (色彩差异)
            // 公式：sqrt( (r1-r2)^2 + (g1-g2)^2 + (b1-b2)^2 )
            // 为了性能，我们通常不进行开方，直接比较距离的平方，或者使用简化的绝对值之和
            
            // 方案一：欧氏距离 (更精确，但计算量稍大，Canvas 处理大图完全没问题)
            const colorDiff = Math.sqrt(
                Math.pow(r - targetRgb.r, 2) +
                Math.pow(g - targetRgb.g, 2) +
                Math.pow(b - targetRgb.b, 2)
            );

            // 方案二 (备选)：绝对值之和 (速度更快，精确度略低)
            // const colorDiff = Math.abs(r - targetRgb.r) + Math.abs(g - targetRgb.g) + Math.abs(b - targetRgb.b);

            // 核心抠图逻辑
            if (colorDiff <= threshold) {
                // 1. 完全匹配背景色：设为全透明
                data[i+3] = 0; 
            } else if (featherRange > 0 && colorDiff <= (threshold + featherRange)) {
                // 2. 边缘羽化区域：计算渐变透明度
                // 距离越接近 threshold，越透明；越接近 (threshold + featherRange)，越不透明
                const opacityFactor = (colorDiff - threshold) / featherRange;
                // 将计算出的透明度应用到原有 Alpha 通道上（保留图片原有的半透明信息）
                data[i+3] = Math.min(a, opacityFactor * 255);
            }
        }

        // 将处理后的像素写回 canvas
        ctx.putImageData(imageData, 0, 0);
        
        // 显示结果
        const resultBox = document.getElementById('resultBox');
        resultBox.innerHTML = '';
        const resImg = new Image();
        const finalDataUrl = canvas.toDataURL('image/png');
        resImg.src = finalDataUrl;
        resultBox.appendChild(resImg);
        
        // 配置下载按钮
        downloadBtn.href = finalDataUrl;
        downloadBtn.download = `ai_rembg_${Date.now()}.png`;
        downloadBtn.style.display = 'block';
    }
</script>

</body>
</html>
