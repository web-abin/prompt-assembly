<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <title>图片处理工具 - 独立开发内测版</title>
    <script id="opencv-script" src="https://www.webrtc-experiment.com/opencv.js" async></script>
    
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { max-width: 900px; margin: 20px auto; padding: 0 20px; background: #f4f7fa; }
        .card { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .area { margin: 16px 0; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input[type="range"] { width: 100%; cursor: pointer; }
        button { padding: 12px; border-radius: 8px; border: none; background: #4285f4; color: white; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:disabled { background: #ccc; cursor: wait; }
        #download { background: #34a853; margin-top: 12px; display: none; }
        .preview { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        .box { text-align: center; }
        .img-box { border: 2px dashed #ddd; border-radius: 8px; height: 300px; display: flex; align-items: center; justify-content: center; background: #fafafa; position: relative; overflow: hidden; }
        .img-box img { max-width: 100%; max-height: 100%; z-index: 2; }
        /* 棋盘格透明背景 */
        .transparent-bg { background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%), linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%); background-size: 20px 20px; background-position: 0 0, 10px 10px; }
        #status { padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; text-align: center; border: 1px solid #ffe58f; background: #fffbe6; }
        .back-home { margin-bottom: 15px; }
        .back-home a { color: #4285f4; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="back-home"><a href="#">← 返回首页</a></div>

<div class="card">
    <h2>图片去背景 & 去水印 (纯前端版)</h2>
    <div id="status">⏳ 正在从开放镜像拉取 OpenCV 引擎...</div>

    <div class="area">
        <label>选择图片</label>
        <input type="file" id="file" accept="image/*">
    </div>

    <div class="area">
        <label>去背景强度 (白色容差): <span id="val-threshold">30</span></label>
        <input type="range" id="threshold" min="0" max="150" value="30">
    </div>

    <button id="process" disabled>引擎加载中...</button>
    <button id="download">保存透明图片</button>

    <div class="preview">
        <div class="box">
            <p>原图</p>
            <div class="img-box" id="originBox"></div>
        </div>
        <div class="box">
            <p>处理结果</p>
            <div class="img-box transparent-bg" id="resultBox"></div>
        </div>
    </div>
</div>

<script>
let srcUrl = null;
let resultUrl = '';
let isReady = false;

// OpenCV 全局回调
var cv = {
    onRuntimeInitialized: () => {
        isReady = true;
        const status = document.getElementById('status');
        status.innerText = '✅ 引擎就绪 (无需服务器，本地计算)';
        status.style.background = '#f6ffed';
        status.style.borderColor = '#b7eb8f';
        document.getElementById('process').disabled = false;
        document.getElementById('process').innerText = '立即处理图片';
    }
};

// 实时显示滑动条数值
document.getElementById('threshold').oninput = function() {
    document.getElementById('val-threshold').innerText = this.value;
};

document.getElementById('file').onchange = e => {
    const f = e.target.files[0];
    if(!f) return;
    if(srcUrl) URL.revokeObjectURL(srcUrl);
    srcUrl = URL.createObjectURL(f);
    const img = document.createElement('img');
    img.src = srcUrl;
    const box = document.getElementById('originBox');
    box.innerHTML = '';
    box.appendChild(img);
};

document.getElementById('process').onclick = () => {
    if(!srcUrl) return alert('请先上传图片');
    const img = new Image();
    img.onload = function() {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        const threshold = parseInt(document.getElementById('threshold').value);

        // --- OpenCV 核心逻辑 ---
        let src = cv.imread(canvas);
        let dst = new cv.Mat();
        
        // 强制转换颜色空间确保 Alpha 通道存在
        cv.cvtColor(src, src, cv.COLOR_RGBA2RGB);
        cv.cvtColor(src, dst, cv.COLOR_RGB2RGBA);

        let data = dst.data;
        for (let i = 0; i < data.length; i += 4) {
            let r = data[i], g = data[i+1], b = data[i+2];
            // 计算灰度值
            let gray = (r + g + b) / 3;

            // 如果颜色接近白色（背景），则将 Alpha 设为 0（透明）
            if (gray > (255 - threshold)) {
                data[i+3] = 0; 
            }
        }

        cv.imshow(canvas, dst);
        resultUrl = canvas.toDataURL('image/png');
        
        const resultBox = document.getElementById('resultBox');
        resultBox.innerHTML = '';
        const resImg = document.createElement('img');
        resImg.src = resultUrl;
        resultBox.appendChild(resImg);
        
        document.getElementById('download').style.display = 'block';

        // 释放内存
        src.delete();
        dst.delete();
    };
    img.src = srcUrl;
};

document.getElementById('download').onclick = () => {
    const a = document.createElement('a');
    a.href = resultUrl;
    a.download = `ai_processed_${Date.now()}.png`;
    a.click();
};

// 容错处理：如果 CDN 加载失败
document.getElementById('opencv-script').onerror = function() {
    document.getElementById('status').innerText = '❌ 引擎加载失败，请检查网络或尝试科学上网。';
    document.getElementById('status').style.background = '#fff2f0';
    document.getElementById('status').style.borderColor = '#ffccc7';
};
</script>

</body>
</html>
