<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>精灵图智能提取与挑选工具</title>
<style>
    *{box-sizing:border-box;font-family:system-ui,sans-serif}
    body{max-width:1100px;margin:20px auto;padding:0 20px;background:#f0f2f5;line-height:1.5}
    .container{background:#fff;padding:24px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.1)}
    .panel{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
    .area{margin:10px 0}
    label{display:block;margin-bottom:6px;font-weight:bold;color:#444;font-size:14px}
    input,button,select{padding:10px;border-radius:6px;border:1px solid #ddd;width:100%}
    button{background:#4e82f1;color:white;border:none;cursor:pointer;font-weight:600;transition:0.2s}
    button:hover{background:#3668d6}
    .preview-box{border:2px dashed #ccc;padding:10px;text-align:center;max-height:400px;overflow:auto;background:#fafafa;position:relative}
    canvas{max-width:100%}
    
    /* 元素列表样式 */
    #elementList{
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
        gap: 10px;
        margin-top: 15px;
        padding: 15px;
        border: 1px solid #eee;
        background: #fff;
        max-height: 300px;
        overflow-y: auto;
    }
    .item-card{
        border: 1px solid #eee;
        padding: 5px;
        text-align: center;
        border-radius: 4px;
        cursor: pointer;
        position: relative;
        background: #f9f9f9;
    }
    .item-card.selected{ border-color: #1eb855; background: #e8f5e9; }
    .item-card img{ max-width: 50px; max-height: 50px; display: block; margin: 0 auto 5px; background: #ccc; }
    .item-card input{ width: auto; cursor: pointer; }

    #resultCanvas{
        background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee 100%), 
                          linear-gradient(45deg, #eee 25%, white 25%, white 75%, #eee 75%, #eee 100%);
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
        border: 1px solid #999;
        display: none;
    }
    .btn-group{ display: flex; gap: 10px; margin-top: 10px; }
    .step-title{ border-left: 4px solid #4e82f1; padding-left: 10px; margin: 20px 0 10px; color: #333; }
</style>
</head>
<body>
<div class="container">
    <h2>智能精灵图提取、过滤与重组</h2>
    
    <div class="panel">
        <div class="left">
            <div class="area">
                <label>1. 上传源图集</label>
                <input type="file" id="sourceFile" accept="image/*">
            </div>
            <div class="area">
                <label>2. 背景色 (点击预览图取色)</label>
                <div style="display:flex;gap:10px">
                    <input type="color" id="bgColor" value="#ffffff" style="width:60px;padding:2px">
                    <input type="text" id="bgColorText" value="#ffffff" readonly>
                </div>
            </div>
            <div class="area">
                <label>3. 容差 (建议 30-50)</label>
                <input type="number" id="tolerance" value="40">
            </div>
        </div>
        <div class="right">
            <div class="area">
                <label>排列每行数量</label>
                <input type="number" id="cols" value="10">
            </div>
            <div class="area">
                <label>间距 (Padding)</label>
                <input type="number" id="padding" value="4">
            </div>
            <button id="detectBtn" style="margin-top:28px;height:50px;background:#1eb855">第一步：识别所有元素</button>
        </div>
    </div>

    <h3 class="step-title">素材预览与挑选 (勾选需要合成的元素)</h3>
    <div id="elementList">等待识别...</div>
    <div class="btn-group">
        <button id="selectAll" style="background:#666; width:100px">全选</button>
        <button id="selectNone" style="background:#666; width:100px">全不选</button>
        <button id="processBtn" style="flex:1; background:#4e82f1">第二步：合成选中项为精灵图</button>
    </div>

    <h3 class="step-title">源图预览</h3>
    <div class="preview-box"><canvas id="sourceCanvas"></canvas></div>

    <h3 class="step-title">最终合成结果 (透明背景)</h3>
    <div class="preview-box">
        <canvas id="resultCanvas"></canvas>
        <div class="btn-group">
            <button id="dlImg" style="display:none;background:#444">下载透明 PNG</button>
            <button id="dlJson" style="display:none;background:#f59e0b">下载 JSON</button>
        </div>
    </div>
</div>

<script>
    const sourceFile = document.getElementById('sourceFile');
    const sourceCanvas = document.getElementById('sourceCanvas');
    const resultCanvas = document.getElementById('resultCanvas');
    const elementList = document.getElementById('elementList');
    const sCtx = sourceCanvas.getContext('2d', {willReadFrequently: true});
    const rCtx = resultCanvas.getContext('2d');
    
    let sourceImg = new Image();
    let detectedElements = []; // 存储所有识别到的元素数据

    sourceFile.onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = event => {
            sourceImg.src = event.target.result;
            sourceImg.onload = () => {
                sourceCanvas.width = sourceImg.width;
                sourceCanvas.height = sourceImg.height;
                sCtx.drawImage(sourceImg, 0, 0);
            };
        };
        reader.readAsDataURL(file);
    };

    sourceCanvas.onclick = e => {
        const rect = sourceCanvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) * (sourceCanvas.width / rect.width));
        const y = Math.floor((e.clientY - rect.top) * (sourceCanvas.height / rect.height));
        const p = sCtx.getImageData(x, y, 1, 1).data;
        const hex = "#" + ((1 << 24) + (p[0] << 16) + (p[1] << 8) + p[2]).toString(16).slice(1);
        document.getElementById('bgColor').value = hex;
        document.getElementById('bgColorText').value = hex;
    };

    // 第一步：识别
    document.getElementById('detectBtn').onclick = () => {
        if(!sourceImg.src) return alert("请先上传图片");
        
        const tol = parseInt(document.getElementById('tolerance').value);
        const bgColor = document.getElementById('bgColor').value;
        const r_bg = parseInt(bgColor.slice(1,3), 16), g_bg = parseInt(bgColor.slice(3,5), 16), b_bg = parseInt(bgColor.slice(5,7), 16);

        const imgData = sCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
        const data = imgData.data, w = imgData.width, h = imgData.height;
        const visited = new Uint8Array(w * h);
        detectedElements = [];
        elementList.innerHTML = "";

        for(let y = 0; y < h; y++){
            for(let x = 0; x < w; x++){
                const idx = (y * w + x);
                if(visited[idx]) continue;
                const pIdx = idx * 4;
                const isBg = Math.abs(data[pIdx]-r_bg) < tol && Math.abs(data[pIdx+1]-g_bg) < tol && Math.abs(data[pIdx+2]-b_bg) < tol;

                if(!isBg && data[pIdx+3] > 10){
                    let minX = x, maxX = x, minY = y, maxY = y;
                    let queue = [[x, y]];
                    visited[idx] = 1;
                    let head = 0;
                    while(head < queue.length){
                        const [cx, cy] = queue[head++];
                        [[cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]].forEach(([nx, ny]) => {
                            if(nx>=0 && nx<w && ny>=0 && ny<h){
                                const ni = ny * w + nx;
                                if(!visited[ni]){
                                    const npi = ni * 4;
                                    const nIsBg = Math.abs(data[npi]-r_bg) < tol && Math.abs(data[npi+1]-g_bg) < tol && Math.abs(data[npi+2]-b_bg) < tol;
                                    if(!nIsBg && data[npi+3] > 10){
                                        visited[ni] = 1; queue.push([nx, ny]);
                                        minX = Math.min(minX, nx); maxX = Math.max(maxX, nx);
                                        minY = Math.min(minY, ny); maxY = Math.max(maxY, ny);
                                    }
                                }
                            }
                        });
                    }
                    if((maxX-minX)>5){
                        const itemW = maxX - minX + 1;
                        const itemH = maxY - minY + 1;
                        
                        // 创建预览小图
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = itemW; tempCanvas.height = itemH;
                        const tCtx = tempCanvas.getContext('2d');
                        const itemData = sCtx.getImageData(minX, minY, itemW, itemH);
                        // 去底色
                        for(let j=0; j<itemData.data.length; j+=4){
                            if(Math.abs(itemData.data[j]-r_bg)<tol && Math.abs(itemData.data[j+1]-g_bg)<tol && Math.abs(itemData.data[j+2]-b_bg)<tol) itemData.data[j+3]=0;
                        }
                        tCtx.putImageData(itemData, 0, 0);

                        detectedElements.push({
                            x: minX, y: minY, w: itemW, h: itemH, 
                            imgData: itemData,
                            preview: tempCanvas.toDataURL(),
                            selected: true
                        });
                    }
                }
                visited[idx] = 1;
            }
        }
        renderList();
    };

    function renderList() {
        elementList.innerHTML = "";
        detectedElements.forEach((el, i) => {
            const div = document.createElement('div');
            div.className = `item-card ${el.selected ? 'selected' : ''}`;
            div.innerHTML = `<img src="${el.preview}"><input type="checkbox" ${el.selected?'checked':''}>`;
            div.onclick = () => {
                el.selected = !el.selected;
                renderList();
            };
            elementList.appendChild(div);
        });
    }

    document.getElementById('selectAll').onclick = () => { detectedElements.forEach(e=>e.selected=true); renderList(); };
    document.getElementById('selectNone').onclick = () => { detectedElements.forEach(e=>e.selected=false); renderList(); };

    // 第二步：合成
    document.getElementById('processBtn').onclick = () => {
        const selectedOnes = detectedElements.filter(e => e.selected);
        if(selectedOnes.length === 0) return alert("请至少选择一个元素");

        const cols = parseInt(document.getElementById('cols').value);
        const pad = parseInt(document.getElementById('padding').value);
        
        let canvasW = 0, canvasH = 0, rowH = 0, curW = 0;
        selectedOnes.forEach((el, i) => {
            curW += el.w + pad;
            rowH = Math.max(rowH, el.h);
            if((i+1)%cols===0 || i===selectedOnes.length-1){
                canvasW = Math.max(canvasW, curW);
                canvasH += rowH + pad;
                curW = 0; rowH = 0;
            }
        });

        resultCanvas.width = canvasW; resultCanvas.height = canvasH;
        resultCanvas.style.display = 'block';
        rCtx.clearRect(0, 0, canvasW, canvasH);

        const frames = {};
        let dx = 0, dy = 0, rMaxH = 0;

        selectedOnes.forEach((el, i) => {
            rCtx.putImageData(el.imgData, dx, dy);
            frames[`sprite_${i}`] = { frame: {x: dx, y: dy, w: el.w, h: el.h}, sourceSize: {w: el.w, h: el.h} };
            dx += el.w + pad;
            rMaxH = Math.max(rMaxH, el.h);
            if((i+1)%cols===0){ dx = 0; dy += rMaxH + pad; rMaxH = 0; }
        });

        document.getElementById('dlImg').style.display = 'inline-block';
        document.getElementById('dlJson').style.display = 'inline-block';
        
        document.getElementById('dlImg').onclick = () => {
            const a = document.createElement('a'); a.download = 'custom_sprites.png';
            a.href = resultCanvas.toDataURL(); a.click();
        };
        document.getElementById('dlJson').onclick = () => {
            const data = { frames, meta: { size: {w: canvasW, h: canvasH}, image: "custom_sprites.png" } };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const a = document.createElement('a'); a.download = 'custom_sprites.json';
            a.href = URL.createObjectURL(blob); a.click();
        };
    };
</script>
</body>
</html>
