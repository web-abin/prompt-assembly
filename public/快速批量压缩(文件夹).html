<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>全资源目录处理工具 (图片缩放+非图片搬运)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f5f5f7; padding: 20px; color: #1d1d1f; line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .upload-btn { background: #0071e3; color: white; padding: 10px 24px; border-radius: 20px; cursor: pointer; font-weight: 500; }
        
        .type-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-right: 5px; text-transform: uppercase; }
        .tag-img { background: #e3f2fd; color: #1976d2; }
        .tag-other { background: #f5f5f7; color: #666; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #fafafa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; font-size: 14px; color: #86868b; }
        th.sortable { cursor: pointer; color: #0071e3; }
        td { padding: 12px; border-bottom: 1px solid #f5f5f7; font-size: 13px; word-break: break-all; }
        
        .preview-img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; background: #eee; }
        .dimension-input { width: 65px; padding: 5px; border: 1px solid #d2d2d7; border-radius: 4px; }
        .not-image-row { background: #fafafa; color: #999; }

        .download-btn { width: 100%; background: #34c759; color: white; padding: 16px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 30px; }
        .download-btn:disabled { background: #d2d2d7; cursor: not-allowed; }
        #status { text-align: center; margin-top: 15px; font-size: 14px; color: #1d1d1f; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <div>
            <h2 style="margin:0">📦 全资源目录处理器</h2>
            <p style="font-size:12px; color:#666; margin:5px 0 0 0">图片支持缩放/压缩，非图片文件将原样保留目录结构导出</p>
        </div>
        <label class="upload-btn">
            上传整个文件夹
            <input type="file" id="folderInput" webkitdirectory directory multiple style="display: none;">
        </label>
    </div>

    <table id="imageTable">
        <thead>
            <tr>
                <th style="width: 70px;">预览</th>
                <th>路径及名称</th>
                <th class="sortable" id="sortSize" style="width: 100px;">大小 ↕</th>
                <th style="width: 90px;">宽(px)</th>
                <th style="width: 90px;">高(px)</th>
                <th style="width: 180px;">处理状态</th>
            </tr>
        </thead>
        <tbody id="fileListBody"></tbody>
    </table>

    <button id="downloadBtn" class="download-btn" disabled>处理图片并一键打包 (.zip)</button>
    <div id="status">等待上传...</div>
</div>

<script>
    const folderInput = document.getElementById('folderInput');
    const fileListBody = document.getElementById('fileListBody');
    const downloadBtn = document.getElementById('downloadBtn');
    const status = document.getElementById('status');
    const sortSizeBtn = document.getElementById('sortSize');
    
    let allFiles = []; // 存储所有文件对象
    let sortAsc = false;

    function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'], i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    folderInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        status.innerText = "正在扫描目录...";
        allFiles = [];
        
        for (const file of files) {
            const isImage = file.type.startsWith('image/') && !file.type.includes('svg');
            let dimensions = { w: '-', h: '-' };
            let ratio = 1;
            let url = '';

            if (isImage) {
                url = URL.createObjectURL(file);
                const d = await getImageDimensions(url);
                dimensions = { w: d.w, h: d.h };
                ratio = d.w / d.h;
            }
            
            allFiles.push({
                file,
                url,
                isImage,
                name: file.name,
                path: file.webkitRelativePath,
                size: file.size,
                originalW: dimensions.w,
                originalH: dimensions.h,
                currentW: dimensions.w,
                currentH: dimensions.h,
                ratio: ratio
            });
        }
        
        renderTable();
        downloadBtn.disabled = false;
        status.innerText = `扫描完成：共 ${allFiles.length} 个文件`;
    });

    async function getImageDimensions(url) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => resolve({ w: img.width, h: img.height });
            img.onerror = () => resolve({ w: '-', h: '-' });
            img.src = url;
        });
    }

    function renderTable() {
        fileListBody.innerHTML = '';
        allFiles.forEach((item, index) => {
            const tr = document.createElement('tr');
            if (!item.isImage) tr.className = 'not-image-row';

            tr.innerHTML = `
                <td>${item.isImage ? `<img src="${item.url}" class="preview-img">` : '<div class="preview-img" style="display:flex;align-items:center;justify-content:center;font-size:10px;color:#999">FILE</div>'}</td>
                <td>
                    <span class="type-tag ${item.isImage ? 'tag-img' : 'tag-other'}">${item.file.type.split('/')[1] || '未知'}</span>
                    <strong>${item.name}</strong>
                    <span style="font-size:11px;color:#999;display:block">${item.path}</span>
                </td>
                <td>${formatBytes(item.size)}</td>
                <td>${item.isImage ? `<input type="number" class="dimension-input width-in" value="${item.currentW}" data-index="${index}">` : '-'}</td>
                <td>${item.isImage ? `<input type="number" class="dimension-input height-in" value="${item.currentH}" data-index="${index}">` : '-'}</td>
                <td style="color:#666; font-size:12px">${item.isImage ? '待处理 (可调尺寸)' : '原样输出 (无需处理)'}</td>
            `;

            if (item.isImage) {
                const widthIn = tr.querySelector('.width-in');
                const heightIn = tr.querySelector('.height-in');
                widthIn.onblur = (e) => {
                    const val = parseInt(e.target.value);
                    item.currentW = val;
                    item.currentH = Math.round(val / item.ratio);
                    renderTable(); // 局部刷新
                };
                heightIn.onblur = (e) => {
                    const val = parseInt(e.target.value);
                    item.currentH = val;
                    item.currentW = Math.round(val * item.ratio);
                    renderTable();
                };
            }
            fileListBody.appendChild(tr);
        });
    }

    sortSizeBtn.onclick = () => {
        sortAsc = !sortAsc;
        allFiles.sort((a, b) => sortAsc ? a.size - b.size : b.size - a.size);
        renderTable();
    };

    downloadBtn.onclick = async () => {
        downloadBtn.disabled = true;
        const zip = new JSZip();
        
        for (let i = 0; i < allFiles.length; i++) {
            const item = allFiles[i];
            status.innerText = `进度: ${i + 1}/${allFiles.length} - ${item.name}`;
            
            if (item.isImage) {
                // 图片逻辑：缩放 + 压缩
                const options = {
                    maxWidthOrHeight: Math.max(item.currentW, item.currentH),
                    useWebWorker: true,
                    initialQuality: 0.95
                };
                try {
                    const processed = await imageCompression(item.file, options);
                    zip.file(item.path, processed);
                } catch (e) {
                    zip.file(item.path, item.file);
                }
            } else {
                // 非图片逻辑：直接原样放入原路径
                zip.file(item.path, item.file);
            }
        }

        status.innerText = "正在封包下载...";
        const blob = await zip.generateAsync({ type: 'blob' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `project_assets_${Date.now()}.zip`;
        a.click();
        
        downloadBtn.disabled = false;
        status.innerText = "完成！所有文件已按原结构打包。";
    };
</script>
</body>
</html>
