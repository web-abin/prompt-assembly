<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>精灵图合成工具（全引擎JSON格式）</title>
<style>
*{box-sizing:border-box;font-family:system-ui,sans-serif}
body{max-width:900px;margin:20px auto;padding:0 20px;background:#f7f9fa}
.container{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
h2{margin-top:0;color:#333}
.area{margin:16px 0}
label{display:block;margin-bottom:6px;font-weight:500}
input,button,select{padding:10px 14px;border-radius:8px;border:1px solid #ddd;width:100%}
button{background:#4e82f1;color:white;border:none;cursor:pointer;margin-top:8px}
#result{margin-top:20px}
#sheet{max-width:100%;border:1px dashed #ccc;display:none;margin-bottom:10px}
#download,#downloadJson{display:none;margin-top:8px;background:#1eb855}
#downloadJson{background:#f59e0b}
.back-home{margin:0 0 16px}
.back-home a{display:inline-block;padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#2563eb;text-decoration:none;font-size:14px;font-weight:500}
.back-home a:hover{background:#eff6ff}
</style>
</head>
<body>
<div class="container">
  <div class="back-home"><a href="index.html#/">← 返回首页</a></div>
  <h2>SpriteSheet 精灵图合成工具</h2>

  <div class="area">
    <label>选择图片（可多选）</label>
    <input type="file" id="files" multiple accept="image/*">
  </div>

  <div class="area">
    <label>每个小图宽度（px，建议用二倍图）→ 高度自动等比例</label>
    <input type="number" id="cellWidth" value="128">
  </div>

  <div class="area">
    <label>每行数量（默认10）</label>
    <input type="number" id="cols" value="10">
  </div>

  <div class="area">
    <label>图片间距（px）</label>
    <input type="number" id="padding" value="0">
  </div>

  <div class="area">
    <label>JSON 导出格式（主流引擎全支持）</label>
    <select id="jsonFormat">
      <option value="normal">普通数组格式</option>
      <option value="pixi">PixiJS 标准 Hash</option>
      <option value="phaser">Phaser 2/3 格式</option>
      <option value="cocos">Cocos Creator 格式</option>
      <option value="egret">Egret 格式</option>
      <option value="texturepacker">TexturePacker 通用 Hash</option>
    </select>
  </div>

  <button id="make">生成精灵图</button>

  <div id="result">
    <img id="sheet">
    <button id="download">下载 role.png</button>
    <button id="downloadJson">下载 spritesheet.json</button>
  </div>
</div>

<script>
const filesEl = document.getElementById('files');
const cellWidth = document.getElementById('cellWidth');
const colsInput = document.getElementById('cols');
const padding = document.getElementById('padding');
const jsonFormat = document.getElementById('jsonFormat');
const makeBtn = document.getElementById('make');
const sheetImg = document.getElementById('sheet');
const downloadBtn = document.getElementById('download');
const downloadJson = document.getElementById('downloadJson');

let images = [];
let frames = [];
let sheetUrl = '';

filesEl.onchange = async e => {
  images = [];
  const files = Array.from(e.target.files);
  for(const f of files){
    const img = new Image();
    img.src = URL.createObjectURL(f);
    await new Promise(r => img.onload = r);
    images.push(img);
  }
  alert(`已加载 ${images.length} 张图片`);
};

makeBtn.onclick = async () => {
  if(!images.length) return alert('请选择图片');

  const w = parseInt(cellWidth.value) || 128;
  const cols = parseInt(colsInput.value) || 10;
  const pad = parseInt(padding.value) || 0;
  const count = images.length;
  const rows = Math.ceil(count / cols);

  const ratio = images[0].height / images[0].width;
  const h = Math.round(w * ratio);

  const canvas = document.createElement('canvas');
  canvas.width = cols * w + (cols - 1) * pad;
  canvas.height = rows * h + (rows - 1) * pad;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);

  frames = [];
  images.forEach((img, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = col * (w + pad);
    const y = row * (h + pad);
    ctx.drawImage(img, x, y, w, h);
    frames.push({ name: `frame-${i+1}`, x, y, w, h });
  });

  canvas.toBlob(blob => {
    sheetUrl = URL.createObjectURL(blob);
    sheetImg.src = sheetUrl;
    sheetImg.style.display = 'block';
    downloadBtn.style.display = 'block';
    downloadJson.style.display = 'block';

    downloadBtn.onclick = () => {
      const a = document.createElement('a');
      a.href = sheetUrl; a.download = 'role.png'; a.click();
    };
  }, 'image/png', 0.95);
};

downloadJson.onclick = () => {
  let jsonData;
  const fmt = jsonFormat.value;

  if(fmt === 'pixi'){
    const o = {}; frames.forEach(f=>o[f.name]={frame:{x:f.x,y:f.y,w:f.w,h:f.h}});
    jsonData = { frames:o, meta:{ image:"role.png", size:{w:sheetImg.naturalWidth,h:sheetImg.naturalHeight} } };
  }
  else if(fmt === 'phaser'){
    jsonData = { frames:frames.map(f=>({ filename:f.name, frame:{x:f.x,y:f.y,w:f.w,h:f.h} })) };
  }
  else if(fmt === 'cocos'){
    const o = {}; frames.forEach(f=>o[f.name]={x:f.x,y:f.y,width:f.w,height:f.h});
    jsonData = { texture:"role.png", frames:o };
  }
  else if(fmt === 'egret'){
    jsonData = { file:"role.png", frames:frames.map(f=>({name:f.name,x:f.x,y:f.y,w:f.w,h:f.h})) };
  }
  else if(fmt === 'texturepacker'){
    const o = {}; frames.forEach(f=>o[f.name]={frame:{x:f.x,y:f.y,w:f.w,h:f.h},sourceSize:{w:f.w,h:f.h}});
    jsonData = { frames:o, meta:{image:"role.png",size:{w:sheetImg.naturalWidth,h:sheetImg.naturalHeight}} };
  }
  else {
    jsonData = frames;
  }

  const blob = new Blob([JSON.stringify(jsonData, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'spritesheet.json';
  a.click();
};
</script>
</body>
</html>
