<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>智能抠图去重工具（相似度可调）</title>
    <style>
        body {
            padding: 30px;
            font-family: Arial, sans-serif;
        }
        .box {
            border: 2px dashed #aaa;
            padding: 20px;
            margin-bottom: 20px;
        }
        .btn-group {
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
        }
        .threshold {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: 10px;
        }
        #result {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }
        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #eee;
            padding: 8px;
            border-radius: 6px;
        }
        .item img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            background: #f5f5f5;
            border-radius: 4px;
        }
        .item label {
            margin-top: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        /* 已选列表区域 */
        .selected-bar {
            margin-top: 30px;
            padding: 10px;
            border-top: 1px solid #ddd;
        }
        .selected-info {
            font-size: 14px;
            margin-bottom: 8px;
        }
        .selected-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .selected-item {
            width: 20px;
            height: 20px;
            object-fit: contain;
            background: #f5f5f5;
            border: 1px solid #eee;
        }
        .file-info {
            margin-top: 8px;
            font-size: 13px;
            color: #555;
        }
        .file-info ul {
            margin: 4px 0 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>

<div class="box">
    <h3>🎯 透明背景元素抠图 · 智能相似度去重</h3>
    <input type="file" id="file" accept="image/png" multiple />
    <div id="fileInfo" class="file-info"></div>

    <div class="btn-group">
        <button id="start">开始抠图</button>
        <button id="selectAll">全选</button>
        <button id="unselectAll">全不选</button>
        <button id="downloadSel">下载选中(ZIP)</button>
        <button type="button" id="goSpritesheet">去合成精灵图</button>

        <div class="threshold">
            <label>去重相似度：</label>
            <input type="range" id="similar" min="80" max="100" value="95">
            <span id="simText">95%</span>
        </div>
    </div>
</div>

<h3>✅ 抠图结果（去重后）：</h3>
<div id="result"></div>

<!-- 已选列表 -->
<div class="selected-bar">
    <div class="selected-info">已选择：<span id="selectedCount">0</span> 张</div>
    <div id="selectedList" class="selected-list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script>
const fileInput = document.getElementById('file');
const fileInfo = document.getElementById('fileInfo');
const startBtn = document.getElementById('start');
const selectAllBtn = document.getElementById('selectAll');
const unselectAllBtn = document.getElementById('unselectAll');
const downloadSelBtn = document.getElementById('downloadSel');
const goSpritesheetBtn = document.getElementById('goSpritesheet');
const similarSlider = document.getElementById('similar');
const simText = document.getElementById('simText');
const result = document.getElementById('result');

const selectedCount = document.getElementById('selectedCount');
const selectedList = document.getElementById('selectedList');

let sources = []; // [{ name, img }]
let elements = [];
let hashes = [];

// 更新相似度显示
similarSlider.oninput = () => {
  simText.textContent = similarSlider.value + '%';
};

function loadFileAsImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const image = new Image();
      image.onload = () => resolve({ name: file.name, img: image });
      image.onerror = reject;
      image.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// 上传图片（多文件）
fileInput.onchange = async (e) => {
  const files = Array.from(e.target.files || []);
  sources = [];
  fileInfo.innerHTML = '';
  if (!files.length) return;

  try {
    sources = await Promise.all(files.map(loadFileAsImage));
  } catch (err) {
    fileInfo.textContent = '部分图片加载失败：' + (err?.message || err);
    return;
  }

  const list = sources.map(s => `<li>${s.name}（${s.img.width}×${s.img.height}）</li>`).join('');
  fileInfo.innerHTML = `已加载 <b>${sources.length}</b> 个文件：<ul>${list}</ul>`;
};

// 生成感知哈希
function getHash(canvas) {
  const size = 16;
  const temp = document.createElement('canvas');
  temp.width = size;
  temp.height = size;
  const ctx = temp.getContext('2d');
  ctx.drawImage(canvas, 0, 0, size, size);
  const d = ctx.getImageData(0, 0, size, size).data;
  const gray = [];
  for (let i = 0; i < d.length; i += 4) {
    gray.push((d[i] + d[i + 1] + d[i + 2]) / 3 * (d[i + 3] / 255));
  }
  const avg = gray.reduce((a, b) => a + b, 0) / gray.length;
  return gray.map(v => v > avg ? 1 : 0);
}

// 汉明距离 = 相似度
function getSimilarity(a, b) {
  let same = 0;
  for (let i = 0; i < a.length; i++) {
    if (a[i] === b[i]) same++;
  }
  return (same / a.length) * 100;
}

// 刷新已选列表和总数
function updateSelectedPreview() {
  const list = elements.filter(e => e.checked);
  selectedCount.textContent = list.length;
  selectedList.innerHTML = '';

  list.forEach(e => {
    const img = document.createElement('img');
    img.className = 'selected-item';
    img.src = e.url;
    selectedList.appendChild(img);
  });
}

// 在单张大图上跑连通域抠图，命中的元素 push 到 elements
function extractFromImage(source) {
  const { name, img } = source;
  const w = img.width;
  const h = img.height;
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);

  const data = ctx.getImageData(0, 0, w, h).data;
  const visited = new Uint8Array(w * h);
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  const threshold = parseInt(similarSlider.value);

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const baseIdx = (y * w + x) * 4;
      const alpha = data[baseIdx + 3];
      if (alpha <= 10 || visited[y * w + x]) continue;

      const queue = [[x, y]];
      visited[y * w + x] = 1;
      let minX = x, maxX = x, minY = y, maxY = y;

      while (queue.length) {
        const [cx, cy] = queue.shift();
        minX = Math.min(minX, cx);
        maxX = Math.max(maxX, cx);
        minY = Math.min(minY, cy);
        maxY = Math.max(maxY, cy);

        for (const [dx, dy] of dirs) {
          const nx = cx + dx, ny = cy + dy;
          if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
          if (visited[ny * w + nx]) continue;
          const i = (ny * w + nx) * 4;
          if (data[i + 3] > 10) {
            visited[ny * w + nx] = 1;
            queue.push([nx, ny]);
          }
        }
      }

      // 抠图
      const c = document.createElement('canvas');
      c.width = maxX - minX + 1;
      c.height = maxY - minY + 1;
      c.getContext('2d').drawImage(canvas, minX, minY, c.width, c.height, 0, 0, c.width, c.height);

      // 去重判断（跨所有源文件共享 hashes）
      const hash = getHash(c);
      let duplicate = false;
      for (const ph of hashes) {
        if (getSimilarity(hash, ph) >= threshold) {
          duplicate = true;
          break;
        }
      }
      if (duplicate) continue;

      hashes.push(hash);
      const url = c.toDataURL('image/png');
      const idx = elements.length;
      elements.push({ url, checked: true, source: name });

      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <img src="${url}">
        <label><input type="checkbox" class="c" data-i="${idx}" checked> 第${idx+1}个</label>
      `;
      result.appendChild(div);
    }
  }
}

// 开始抠图（遍历所有上传文件）
startBtn.onclick = () => {
  if (!sources.length) return;
  elements = [];
  hashes = [];
  result.innerHTML = '';

  for (const source of sources) {
    extractFromImage(source);
  }

  updateSelectedPreview();
};

// 全选
selectAllBtn.onclick = () => {
  document.querySelectorAll('.c').forEach((cb, i) => {
    cb.checked = true;
    elements[i].checked = true;
  });
  updateSelectedPreview();
};

// 全不选
unselectAllBtn.onclick = () => {
  document.querySelectorAll('.c').forEach((cb, i) => {
    cb.checked = false;
    elements[i].checked = false;
  });
  updateSelectedPreview();
};

// 同步状态 + 实时更新已选
document.addEventListener('change', e => {
  if (e.target.classList.contains('c')) {
    const i = e.target.dataset.i;
    elements[i].checked = e.target.checked;
    updateSelectedPreview();
  }
});

// 跳转到站内「精灵图合成」页（HashRouter）
goSpritesheetBtn.onclick = () => {
  try {
    if (window.parent && window.parent !== window) {
      window.parent.location.hash = '#/spritesheet';
    } else {
      window.location.hash = '#/spritesheet';
    }
  } catch (err) {
    window.location.hash = '#/spritesheet';
  }
};

// 下载选中
downloadSelBtn.onclick = async () => {
  const list = elements.filter(e => e.checked);
  if (!list.length) return;
  const zip = new JSZip();
  const folder = zip.folder("抠图结果");
  list.forEach((e, i) => {
    const base64 = e.url.split(',')[1];
    folder.file(`元素_${i+1}.png`, base64, { base64: true });
  });
  const blob = await zip.generateAsync({ type: 'blob' });
  saveAs(blob, "抠图结果.zip");
};
</script>
</body>
</html>
