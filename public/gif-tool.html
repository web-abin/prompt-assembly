<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF 极速合成与拆分 - AI造物进化</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { max-width: 700px; margin: 30px auto; padding: 0 20px; background: #f7f9fa; line-height: 1.5; }
        .card { background: #fff; padding: 24px; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { margin-top: 0; color: #1a1a1a; font-size: 1.4rem; border-left: 4px solid #4e82f1; padding-left: 12px; }
        .area { margin: 20px 0; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #444; }
        input[type="file"] { padding: 12px; border-radius: 8px; border: 2px dashed #ddd; width: 100%; cursor: pointer; background: #fff; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        button { padding: 12px; border-radius: 8px; border: none; background: #4e82f1; color: #fff; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #3b6cd4; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .preview { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; min-height: 80px; padding: 10px; background: #fdfdfd; border-radius: 8px; border: 1px solid #eee; align-items: center; justify-content: center; }
        .preview img { height: 80px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .follow { background: linear-gradient(135deg, #e8f4ff 0%, #d1e9ff 100%); padding: 16px; border-radius: 10px; color: #0d47a1; margin-top: 25px; text-align: center; font-size: 0.95rem; }
        .back-home { margin-bottom: 16px; }
        .back-home a { display: inline-block; padding: 8px 16px; border-radius: 8px; border: 1px solid #eee; background: #fff; color: #4e82f1; text-decoration: none; font-size: 14px; font-weight: 500; }
        #status { font-size: 13px; color: #4e82f1; margin-top: 10px; font-weight: 500; min-height: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="back-home"><a href="index.html#/">← 返回首页</a></div>

<div class="card">
    <h2>GIF 极速处理工具</h2>

    <div class="area">
        <label>选择文件（合成请选多张图 / 拆分请选单个GIF）</label>
        <input type="file" id="file" accept="image/gif,image/*" multiple>
        <div id="status"></div>
    </div>

    <div class="btn-group">
        <button id="splitBtn">拆分 GIF</button>
        <button id="makeBtn">合成 GIF</button>
    </div>

    <div id="preview" class="preview">
        <p id="placeholder" style="color:#999; font-size:13px;">等待操作预览...</p>
    </div>
</div>

<script src="https://unpkg.com/gif-frames@1.0.1/dist/gif-frames.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>

<script>
    const preview = document.getElementById('preview');
    const fileInput = document.getElementById('file');
    const status = document.getElementById('status');

    // 解决 Worker 跨域的 Blob 注入
    const WORKER_URL = 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js';
    let blobWorkerUrl = null;

    async function getWorkerBlobUrl() {
        if (blobWorkerUrl) return blobWorkerUrl;
        try {
            const response = await fetch(WORKER_URL);
            const script = await response.text();
            const blob = new Blob([script], { type: 'application/javascript' });
            blobWorkerUrl = URL.createObjectURL(blob);
            return blobWorkerUrl;
        } catch (e) {
            console.error("Worker 加载失败:", e);
            return WORKER_URL;
        }
    }

    const loadImage = (file) => {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error('图片加载失败'));
            img.src = url;
        });
    };

    // --- 拆分逻辑 (使用更稳定的 gif-frames) ---
    document.getElementById('splitBtn').onclick = async () => {
        const file = fileInput.files[0];
        if (!file || !file.type.includes('gif')) return alert('请上传 GIF 文件');
        
        status.innerText = '⏳ 正在智能解析 GIF 帧...';
        preview.innerHTML = '';

        try {
            const frames = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
            status.innerText = `✅ 拆分完成，共 ${frames.length} 帧`;
            
            frames.forEach(frame => {
                const canvas = frame.getImage();
                const frameImg = new Image();
                frameImg.src = canvas.toDataURL('image/png');
                preview.appendChild(frameImg);
            });
        } catch (err) {
            console.error(err);
            status.innerText = '❌ 拆分失败，请检查文件';
        }
    };

    // --- 合成逻辑 ---
    document.getElementById('makeBtn').onclick = async () => {
        const files = Array.from(fileInput.files);
        if (files.length < 2) return alert('请选择至少 2 张图片');

        const btn = document.getElementById('makeBtn');
        btn.disabled = true;
        status.innerText = '⏳ 正在预加载资源...';

        try {
            const [images, workerScriptUrl] = await Promise.all([
                Promise.all(files.map(loadImage)),
                getWorkerBlobUrl()
            ]);

            status.innerText = '⚙️ 正在高性能渲染...';

            const gif = new GIF({
                workers: 2,
                quality: 10,
                width: images[0].naturalWidth,
                height: images[0].naturalHeight,
                workerScript: workerScriptUrl
            });

            images.forEach(img => {
                gif.addFrame(img, { delay: 200, copy: true });
            });

            gif.on('finished', blob => {
                status.innerText = '🎉 合成成功！';
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `ai-creation-${Date.now()}.gif`;
                a.click();
                
                const resultImg = new Image();
                resultImg.src = url;
                resultImg.style.height = '150px';
                preview.innerHTML = '<p style="width:100%; text-align:center;">生成结果预览：</p>';
                preview.appendChild(resultImg);
                btn.disabled = false;
            });

            gif.render();

        } catch (err) {
            console.error(err);
            status.innerText = '❌ 合成失败';
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
